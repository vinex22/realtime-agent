<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Agent (WebSocket Proxy)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
        button { padding: 0.6rem 1rem; margin-right: 0.5rem; font-size: 1rem; cursor: pointer; }
        #log { margin-top: 1rem; padding: 0.75rem; background: #111; color: #0f0; font-family: Consolas, monospace; font-size: 12px; height: 60vh; overflow-y: auto; border-radius: 6px; white-space: pre-wrap; }
        .row { display: flex; gap: 0.5rem; align-items: center; }
        textarea { width: 100%; height: 4rem; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem; }
        .header h1 { margin: 0; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
        .badge-ws { background: #2563eb; }
        footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #ddd; font-size: 12px; color: #888; text-align: center; }
        .logos { display: flex; align-items: center; gap: 18px; margin-bottom: 1.2rem; }
        .logos img { height: 32px; }
        .logos span { font-size: 22px; color: #999; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .bounce1 { animation: bounce 2s ease-in-out infinite; }
        .bounce2 { animation: bounce 2s ease-in-out infinite 0.3s; }
        .bounce3 { animation: bounce 2s ease-in-out infinite 0.6s; }
    </style>
</head>
<body>
    <div class="logos">
        <img src="https://img.icons8.com/color/48/microsoft.png" alt="Microsoft" class="bounce1" />
        <span class="bounce2">+</span>
        <img src="https://img.icons8.com/fluency/48/azure-1.png" alt="Azure" class="bounce2" />
        <span class="bounce3">+</span>
        <svg class="bounce3" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/></svg>
    </div>
    <div class="header">
        <h1>🎙️ Realtime Agent</h1>
        <span class="badge badge-ws">WebSocket Proxy • VNet-Safe</span>
    </div>
    <p>All audio flows through the server. No direct browser-to-Azure connection.</p>
    <div class="row">
        <button id="startBtn" onclick="startSession()">Start Session</button>
        <button id="stopBtn" onclick="stopSession()" disabled>Stop Session</button>
    </div>
    <div style="margin-top: 1rem;">
        <label>Send text: <input id="textInput" style="width:60%" placeholder="Type and press Enter" /></label>
        <button onclick="sendText()">Send</button>
    </div>
    <div id="log"></div>
    <footer>v1.2 &middot; Built by <strong>Vinex22@gmail.com</strong> &middot; <strong>Vinayjain@microsoft.com</strong></footer>

    <script>
        let ws = null;
        let audioCtx = null;
        let micStream = null;
        let micProcessor = null;
        let playQueue = [];
        let isPlaying = false;
        let activeSources = [];  // track playing BufferSourceNodes

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += msg + '\n';
            el.scrollTop = el.scrollHeight;
        }

        // --- Audio Playback (PCM16 24kHz from server) ---
        function base64ToInt16(b64) {
            const raw = atob(b64);
            const buf = new ArrayBuffer(raw.length);
            const u8 = new Uint8Array(buf);
            for (let i = 0; i < raw.length; i++) u8[i] = raw.charCodeAt(i);
            return new Int16Array(buf);
        }

        function playPcm16(int16) {
            if (!audioCtx) return;
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
            const buffer = audioCtx.createBuffer(1, float32.length, 24000);
            buffer.getChannelData(0).set(float32);
            playQueue.push(buffer);
            drainPlayQueue();
        }

        let nextPlayTime = 0;
        function drainPlayQueue() {
            if (playQueue.length === 0) return;
            if (!audioCtx) return;
            while (playQueue.length > 0) {
                const buffer = playQueue.shift();
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                const startTime = Math.max(now, nextPlayTime);
                source.start(startTime);
                nextPlayTime = startTime + buffer.duration;
                activeSources.push(source);
                source.onended = () => {
                    const idx = activeSources.indexOf(source);
                    if (idx >= 0) activeSources.splice(idx, 1);
                };
            }
        }

        function stopPlayback() {
            playQueue = [];
            nextPlayTime = 0;
            for (const src of activeSources) {
                try { src.stop(); } catch {}
            }
            activeSources = [];
        }

        // --- Microphone Capture (PCM16 24kHz -> base64 -> server) ---
        async function startMic() {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 24000, channelCount: 1 } });
            audioCtx = new AudioContext({ sampleRate: 24000 });
            const source = audioCtx.createMediaStreamSource(micStream);

            // ScriptProcessorNode (widely supported; AudioWorklet is better but more complex)
            micProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
            micProcessor.onaudioprocess = (e) => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                const float32 = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(float32.length);
                for (let i = 0; i < float32.length; i++) {
                    const s = Math.max(-1, Math.min(1, float32[i]));
                    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                // Base64 encode
                const bytes = new Uint8Array(int16.buffer);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                const b64 = btoa(binary);

                ws.send(JSON.stringify({
                    type: 'input_audio_buffer.append',
                    audio: b64,
                }));
            };
            source.connect(micProcessor);
            micProcessor.connect(audioCtx.destination); // required for onaudioprocess to fire
            log('Mic capturing at 24kHz PCM16');
        }

        function stopMic() {
            if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
            if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        }

        // --- Session ---
        async function startSession() {
            document.getElementById('startBtn').disabled = true;
            try {
                const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const url = `${proto}//${location.host}/ws`;
                log('Connecting to server: ' + url);

                ws = new WebSocket(url);

                ws.onopen = async () => {
                    log('WebSocket connected to server');
                    await startMic();
                    document.getElementById('stopBtn').disabled = false;
                };

                ws.onmessage = (e) => {
                    try {
                        const evt = JSON.parse(e.data);

                        if (evt.type === 'response.output_audio.delta') {
                            // Play audio chunk
                            const pcm = base64ToInt16(evt.delta);
                            playPcm16(pcm);
                        } else if (evt.type === 'response.output_audio_transcript.done') {
                            log('Assistant: ' + (evt.transcript || ''));
                        } else if (evt.type === 'conversation.item.input_audio_transcription.completed') {
                            log('You: ' + (evt.transcript || ''));
                        } else if (evt.type === 'session.created') {
                            log('Session created: ' + (evt.session?.id || ''));
                        } else if (evt.type === 'session.updated') {
                            log('Session configured (voice, VAD, etc.)');
                            log('Start talking!');
                        } else if (evt.type === 'input_audio_buffer.speech_started') {
                            log('[listening...]');
                            // Interrupt playback — stop all scheduled audio immediately
                            stopPlayback();
                        } else if (evt.type === 'input_audio_buffer.speech_stopped') {
                            log('[processing...]');
                        } else if (evt.type === 'error') {
                            log('ERROR: ' + JSON.stringify(evt.error));
                        } else {
                            log('  ' + evt.type);
                        }
                    } catch {
                        log('raw: ' + e.data);
                    }
                };

                ws.onclose = (e) => {
                    log('WebSocket closed: ' + e.code + ' ' + (e.reason || ''));
                    cleanup();
                };

                ws.onerror = () => {
                    log('WebSocket error');
                    cleanup();
                };

            } catch (err) {
                log('Error: ' + err.message);
                cleanup();
            }
        }

        function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({
                type: 'conversation.item.create',
                item: { type: 'message', role: 'user', content: [{ type: 'input_text', text }] },
            }));
            ws.send(JSON.stringify({ type: 'response.create' }));
            log('You (text): ' + text);
            input.value = '';
        }

        document.getElementById('textInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendText();
        });

        function stopSession() {
            if (ws) { ws.close(); ws = null; }
            cleanup();
            log('Session stopped');
        }

        function cleanup() {
            stopMic();
            stopPlayback();
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }
    </script>
</body>
</html>
