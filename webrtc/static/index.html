<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure OpenAI Realtime Agent (WebRTC)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
        button { padding: 0.6rem 1rem; margin-right: 0.5rem; font-size: 1rem; cursor: pointer; }
        #log { margin-top: 1rem; padding: 0.75rem; background: #111; color: #0f0; font-family: Consolas, monospace; font-size: 12px; height: 60vh; overflow-y: auto; border-radius: 6px; white-space: pre-wrap; }
        .row { display: flex; gap: 0.5rem; align-items: center; }
        textarea { width: 100%; height: 4rem; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem; }
        .header h1 { margin: 0; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
        .badge-webrtc { background: #16a34a; }
        footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #ddd; font-size: 12px; color: #888; text-align: center; }
        .logos { display: flex; align-items: center; gap: 18px; margin-bottom: 1.2rem; }
        .logos img { height: 32px; }
        .logos span { font-size: 22px; color: #999; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .bounce1 { animation: bounce 2s ease-in-out infinite; }
        .bounce2 { animation: bounce 2s ease-in-out infinite 0.3s; }
        .bounce3 { animation: bounce 2s ease-in-out infinite 0.6s; }
    </style>
</head>
<body>
    <div class="logos">
        <img src="https://img.icons8.com/color/48/microsoft.png" alt="Microsoft" class="bounce1" />
        <span class="bounce2">+</span>
        <img src="https://img.icons8.com/fluency/48/azure-1.png" alt="Azure" class="bounce2" />
        <span class="bounce3">+</span>
        <svg class="bounce3" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/></svg>
    </div>
    <div class="header">
        <h1>🎙️ Realtime Agent</h1>
        <span class="badge badge-webrtc">WebRTC • Direct</span>
    </div>
    <p>Click <strong>Start Session</strong>, allow microphone access, then speak. Responses play as audio.</p>
    <div class="row">
        <button id="startBtn" onclick="startSession()">Start Session</button>
        <button id="stopBtn" onclick="stopSession()" disabled>Stop Session</button>
    </div>
    <div style="margin-top: 1rem;">
        <label>Send text: <input id="textInput" style="width:60%" placeholder="Type and press Enter" /></label>
        <button onclick="sendText()">Send</button>
    </div>
    <div id="log"></div>
    <footer>v1.2 &middot; Built by <strong>Vinex22@gmail.com</strong> &middot; <strong>Vinayjain@microsoft.com</strong></footer>

    <script>
        let pc = null;
        let dc = null;
        let audioEl = null;

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += msg + '\n';
            el.scrollTop = el.scrollHeight;
        }

        async function startSession() {
            // Stop any existing session first
            if (pc || dc || audioEl) stopSession();
            document.getElementById('startBtn').disabled = true;
            try {
                const cfg = await (await fetch('/config')).json();
                const WEBRTC_URL = `https://${cfg.azureResource}.openai.azure.com/openai/v1/realtime/calls?webrtcfilter=on`;

                log('🔑 Requesting ephemeral token...');
                const tokResp = await fetch('/token');
                if (!tokResp.ok) throw new Error(`/token ${tokResp.status}`);
                const { token } = await tokResp.json();
                log('✅ Ephemeral token received');

                pc = new RTCPeerConnection();

                audioEl = document.createElement('audio');
                audioEl.autoplay = true;
                document.body.appendChild(audioEl);

                pc.ontrack = (e) => {
                    if (e.streams[0]) {
                        audioEl.srcObject = e.streams[0];
                        log('🎵 Remote audio track attached');
                    }
                };

                log('🎤 Requesting microphone...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getAudioTracks().forEach((t) => pc.addTrack(t, stream));
                log('✅ Microphone added');

                dc = pc.createDataChannel('realtime-channel');
                dc.addEventListener('open', () => {
                    log('✅ Data channel open');
                    document.getElementById('stopBtn').disabled = false;
                });
                dc.addEventListener('message', (e) => {
                    try {
                        const ev = JSON.parse(e.data);
                        if (ev.type === 'response.output_audio_transcript.done') {
                            log('🤖 ' + (ev.transcript || ''));
                        } else if (ev.type === 'conversation.item.input_audio_transcription.completed') {
                            log('🧑 ' + (ev.transcript || ''));
                        } else {
                            log('• ' + ev.type);
                        }
                    } catch {
                        log('• raw ' + e.data);
                    }
                });
                dc.addEventListener('close', () => log('❌ Data channel closed'));

                pc.onconnectionstatechange = () => log('🔗 ' + pc.connectionState);
                pc.oniceconnectionstatechange = () => log('🧊 ' + pc.iceConnectionState);

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                log('📡 Sending SDP offer...');

                const sdpResp = await fetch(WEBRTC_URL, {
                    method: 'POST',
                    body: offer.sdp,
                    headers: {
                        Authorization: `Bearer ${token}`,
                        'Content-Type': 'application/sdp',
                    },
                });
                if (!sdpResp.ok) throw new Error(`SDP ${sdpResp.status}: ${await sdpResp.text()}`);
                const answerSdp = await sdpResp.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
                log('✅ WebRTC session established. Start talking!');
            } catch (err) {
                log('❌ ' + err.message);
                document.getElementById('startBtn').disabled = false;
            }
        }

        function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text || !dc || dc.readyState !== 'open') return;
            dc.send(JSON.stringify({
                type: 'conversation.item.create',
                item: { type: 'message', role: 'user', content: [{ type: 'input_text', text }] },
            }));
            dc.send(JSON.stringify({ type: 'response.create' }));
            log('📤 user (text): ' + text);
            input.value = '';
        }

        document.getElementById('textInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendText();
        });

        function stopSession() {
            if (dc) dc.close();
            if (pc) pc.close();
            if (audioEl) audioEl.remove();
            pc = dc = audioEl = null;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            log('🛑 Session stopped');
        }
    </script>
</body>
</html>
